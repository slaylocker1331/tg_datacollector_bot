<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База данных пользователей</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 База данных пользователей телеграм-бота</h1>
            <p>Все зарегистрированные пользователи</p>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="total-users">0</div>
                <div class="stat-label">Всего пользователей</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="last-update">--:--</div>
                <div class="stat-label">Последнее обновление</div>
            </div>
        </div>

        <div class="content">
            <button class="refresh-btn" onclick="loadUsers()">🔄 Обновить</button>
            
            <div id="loading" class="loading" style="display:none;">
                <div class="spinner"></div>
                <p>Загрузка данных...</p>
            </div>

            <div id="error" class="error" style="display:none;"></div>

            <div id="empty" class="empty" style="display:none;">
                <div class="empty-icon">📭</div>
                <p>Пользователей нет</p>
            </div>

            <table id="users-table" style="display:none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Телефон</th>
                        <th>Дата регистрации</th>
                    </tr>
                </thead>
                <tbody id="users-body">
                </tbody>
            </table>
        </div>

        <div class="footer">
            ✨ Данные обновляются в реальном времени
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
